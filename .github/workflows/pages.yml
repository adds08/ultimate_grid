name: Deploy showcase to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # base-href must match the repo name for project Pages
      # (https://adds08.github.io/ultimate_grid/). When a custom domain is
      # configured, add a CNAME file and switch --base-href to "/".
      - name: Build showcase web app
        working-directory: example
        run: |
          flutter pub get
          dart run tool/sync_assets.dart
          flutter build web --release --base-href /ultimate_grid/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: example/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

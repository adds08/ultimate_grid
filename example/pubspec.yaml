name: ultimate_grid_example
description: "Showcase site for ultimate_grid — live, copy-pasteable examples, docs, and roadmap."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  ultimate_grid:
    path: ../
  go_router: ^14.6.2
  flutter_markdown: ^0.7.4
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/source/screens/
    - assets/docs/
    - assets/snippets/
